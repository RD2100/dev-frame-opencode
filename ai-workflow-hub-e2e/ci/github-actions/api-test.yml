name: API Test
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup TestFrame
        run: pip install -r requirements.txt

      - name: Run API Tests
        run: |
          python -m cli.main run --project=app-api --profile=regression
        env:
          MS_API_KEY: ${{ secrets.MS_API_KEY }}
          MS_ACCESS_KEY: ${{ secrets.MS_ACCESS_KEY }}

      - name: Generate Report
        if: always()
        run: python -m cli.main report --project=app-api

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/
