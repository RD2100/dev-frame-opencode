# Sentry 配置模板
# 实际使用时复制为 sentry.properties 并填入真实值

# DSN (Data Source Name) - 从 Sentry 项目设置获取
# dsn=https://examplePublicKey@o0.ingest.sentry.io/0

# 环境标识 (development/staging/production)
# environment=staging

# 采样率 (0.0 - 1.0)
# traces.sample-rate=1.0
# profiles.sample-rate=1.0

# Release 版本 - 通常 CI 中自动注入
# release=com.example.app@1.0.0+1

# 调试模式
# debug=false
