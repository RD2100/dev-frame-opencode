mode: "@go"
profile: ai-dev
risk: low

goal: >
  Complete the first terminal-state same-run governance chain set by adding
  the failed case. We already have same-run chain assertions for blocked and
  human_required; this slice closes the trio.

problem_statement:
  - "M4-I1 covers blocked."
  - "M4-I2 covers human_required."
  - "failed still lacks a same-run multi-surface governance chain assertion."

must_do:
  - Add one focused same-run chain test for a failed run.
  - The test must assert coherence across:
    - final-report
    - failure-analysis
    - analyze_recovery
    - run_recover CLI
    - verify_run_evidence
    - run_show and/or run_verify display
  - Reuse the synthetic-run pattern from the existing terminal governance chain tests when possible.
  - Keep the slice test-only unless a real inconsistency is exposed.

must_not_do:
  - Do not add new runtime features unless the test reveals a contradiction.
  - Do not touch src/** by default.
  - Do not touch tasks.yaml, ai-workflow-hub-e2e, or smoke_report.txt.

