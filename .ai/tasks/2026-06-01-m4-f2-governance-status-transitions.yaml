id: m4-f2-governance-status-transitions
title: Add append-only transitions for accepted_risk mitigated and obsolete
created_at: "2026-06-01T00:25:00+08:00"
mode: "@go"
profile: ai-dev
risk: medium

goal: >
  Land the first minimal writable governance transition slice for advanced
  statuses. The system already understands accepted_risk, mitigated, and
  obsolete in prompt/report visibility, but there are no deterministic helper
  functions or CLI commands to set those statuses.

problem_statement:
  - "VALID_STATUSES includes accepted_risk, mitigated, obsolete."
  - "Prompt and final-report now understand these statuses."
  - "There are still no append-only transition helpers or CLI commands to produce them."

must_do:
  - Add deterministic append-only ledger helpers for:
    - accepted_risk
    - mitigated
    - obsolete
  - Preserve original issue context (title/category/severity/hint) when these transitions are appended.
  - Extend `aihub issue` with narrow new commands for these transitions.
  - Keep transitions append-only; no JSONL rewriting.
  - Add focused tests for helper behavior and CLI behavior.
  - Ensure prompt context stays excluded for these statuses after transition.

must_not_do:
  - Do not add bulk edit, delete, history, or export commands.
  - Do not change blocking semantics for open/fixed/wontfix/human_override.
  - Do not change finalizer routing.
  - Do not touch coding_graph.py, shell_runner.py, tasks.yaml, ai-workflow-hub-e2e, or smoke_report.txt.

allow_write:
  - ai-workflow-hub/src/ai_workflow_hub/issue_ledger.py
  - ai-workflow-hub/src/ai_workflow_hub/cli.py
  - ai-workflow-hub/tests/test_issue_ledger.py
  - ai-workflow-hub/tests/test_issue_cli.py
  - .ai/tasks/2026-06-01-m4-f2-governance-status-transitions.yaml
  - .ai/runs/m4-f2-governance-status-transitions/**
  - .ai/reports/2026-06-01-m4-f2-governance-status-transitions-result.md

deny_write:
  - .git/**
  - "**/.env"
  - "**/*secret*"
  - "**/*key*"
  - ai-workflow-hub/tasks.yaml
  - ai-workflow-hub-e2e/**
  - smoke_report.txt
  - ai-workflow-hub/src/ai_workflow_hub/shell_runner.py
  - ai-workflow-hub/src/ai_workflow_hub/workflows/coding_graph.py

token_budget_guidance:
  - Read only issue_ledger.py, issue CLI section in cli.py, and direct tests unless blocked.
  - Reuse the existing close/reopen pattern instead of inventing a new transition framework.

acceptance_criteria:
  - accepted_risk, mitigated, and obsolete can be appended through deterministic helpers.
  - aihub issue exposes narrow commands for these transitions.
  - original issue context is preserved on transition.
  - prompt context remains excluded for these statuses after transition.
  - focused tests pass and broader tests pass.

suggested_test_commands:
  - python -m pytest tests/test_issue_cli.py tests/test_issue_ledger.py -q
  - python -m pytest tests/ -q
