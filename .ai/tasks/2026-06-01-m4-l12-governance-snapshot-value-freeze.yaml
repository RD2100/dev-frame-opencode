id: m4-l12-governance-snapshot-value-freeze
title: Freeze governance snapshot section value contracts
created_at: "2026-06-01T19:28:00+08:00"
mode: "@go"
profile: ai-dev
risk: low

goal: >
  Freeze the governance snapshot section values as explicit shared contracts so
  consumers and tests do not have to reconstruct the snapshot semantics from
  other constants indirectly.

problem_statement:
  - "The governance snapshot now has stable shape and identity."
  - "Its `ordering`, `json_shape`, and `summary` sections are still validated mostly by deriving expected values from other contracts or live inventory."
  - "We want those snapshot sections themselves to become first-class explicit contracts."

must_do:
  - Add explicit shared snapshot section value contracts for at least:
    - `ordering`
    - `json_shape`
    - `summary`
  - Make snapshot builder consume those explicit contracts where appropriate, or document clearly where a contract must remain live-derived.
  - Add focused tests that assert snapshot section values against the explicit snapshot contracts.
  - Keep snapshot visible values unchanged.
  - Include a real-path verification command for `--format snapshot`.

must_not_do:
  - Do not change runtime governance behavior.
  - Do not change blocking semantics.
  - Do not change existing `panel`, `markdown`, or ordinary `json` outputs.
  - Do not change snapshot top-level shape or `_meta` identity.
  - Do not touch coding_graph.py, shell_runner.py, tasks.yaml, ai-workflow-hub-e2e, or smoke_report.txt.

allow_write:
  - ai-workflow-hub/src/ai_workflow_hub/governance_matrix.py
  - ai-workflow-hub/tests/test_governance_matrix_audit.py
  - ai-workflow-hub/tests/test_go_dispatch.py
  - .ai/tasks/2026-06-01-m4-l12-governance-snapshot-value-freeze.yaml
  - .ai/runs/m4-l12-governance-snapshot-value-freeze/**
  - .ai/reports/2026-06-01-m4-l12-governance-snapshot-value-freeze-result.md

deny_write:
  - .git/**
  - "**/.env"
  - "**/*secret*"
  - "**/*key*"
  - ai-workflow-hub/tasks.yaml
  - ai-workflow-hub-e2e/**
  - smoke_report.txt
  - ai-workflow-hub/src/ai_workflow_hub/shell_runner.py
  - ai-workflow-hub/src/ai_workflow_hub/workflows/coding_graph.py
  - ai-workflow-hub/src/ai_workflow_hub/cli.py

token_budget_guidance:
  - Read only governance_matrix.py and focused governance snapshot tests unless blocked.
  - Keep the slice to snapshot section contract freeze plus regression coverage only.

acceptance_criteria:
  - Governance snapshot exposes explicit section value contracts.
  - Snapshot output preserves the current visible section values.
  - Focused tests fail if snapshot section values drift.
  - Real-path `--format snapshot` still succeeds.

suggested_test_commands:
  - python -m pytest tests/test_governance_matrix_audit.py tests/test_go_dispatch.py -q
  - python -m ai_workflow_hub.cli governance matrix --format snapshot
