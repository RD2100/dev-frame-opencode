id: m4-l1b-governance-matrix-cli-encoding
title: Harden governance matrix CLI output for Windows console encoding
created_at: "2026-06-01T15:10:00+08:00"
mode: "@go"
profile: ai-dev
risk: low

goal: >
  Fix the human-facing governance matrix CLI so it works on real Windows
  consoles without UnicodeEncodeError, while keeping the command read-only and
  deterministic.

problem_statement:
  - "`python -m ai_workflow_hub.cli governance matrix` currently crashes on Windows GBK consoles."
  - "The crash is triggered by non-ASCII marker glyphs in the Rich panel output."
  - "Current focused tests pass, but they do not exercise the real Windows console path."

must_do:
  - Replace console-fragile marker glyphs in governance matrix output with safe ASCII output.
  - Keep the governance matrix summary read-only and deterministic.
  - Add a focused regression test that would have caught the non-ASCII marker issue at the render/payload level.
  - Include at least one real-path verification command using `python -m ai_workflow_hub.cli governance matrix`.

must_not_do:
  - Do not change runtime governance behavior.
  - Do not change blocking semantics.
  - Do not broaden the command into a mutating or file-writing flow.
  - Do not touch coding_graph.py, shell_runner.py, tasks.yaml, ai-workflow-hub-e2e, or smoke_report.txt.

allow_write:
  - ai-workflow-hub/src/ai_workflow_hub/governance_matrix.py
  - ai-workflow-hub/tests/test_go_dispatch.py
  - .ai/tasks/2026-06-01-m4-l1b-governance-matrix-cli-encoding.yaml
  - .ai/runs/m4-l1b-governance-matrix-cli-encoding/**
  - .ai/reports/2026-06-01-m4-l1b-governance-matrix-cli-encoding-result.md

deny_write:
  - .git/**
  - "**/.env"
  - "**/*secret*"
  - "**/*key*"
  - ai-workflow-hub/tasks.yaml
  - ai-workflow-hub-e2e/**
  - smoke_report.txt
  - ai-workflow-hub/src/ai_workflow_hub/shell_runner.py
  - ai-workflow-hub/src/ai_workflow_hub/workflows/coding_graph.py
  - ai-workflow-hub/src/ai_workflow_hub/cli.py

token_budget_guidance:
  - Read only the governance matrix module, focused CLI tests, and the M4-L1 report unless blocked.
  - Keep the slice to output encoding hardening plus regression coverage only.

acceptance_criteria:
  - `python -m ai_workflow_hub.cli governance matrix` succeeds on the local Windows console path.
  - Governance matrix output uses console-safe markers.
  - Focused tests pass and no governance behavior changes are introduced.

suggested_test_commands:
  - python -m pytest tests/test_go_dispatch.py -q
  - python -m ai_workflow_hub.cli governance matrix
