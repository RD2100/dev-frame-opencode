id: m4-a-model-reviewer-backend
title: Add real model reviewer backend without changing the deterministic reviewer loop
created_at: "2026-05-31T00:00:00+08:00"
mode: "@go"
profile: ai-dev
risk: medium

goal: >
  Add a real model-based reviewer backend on top of the existing Phase 1
  deterministic reviewer minimal loop. The model reviewer may generate
  candidate findings, but authoritative review artifacts must still be produced
  by deterministic parsing, validation, normalization, and merge logic.

m4_0_gate:
  hard_rule: >
    Before implementing M4-A, run the Phase 1 fake E2E and fail-closed tests.
    If they fail, stop and do not modify the reviewer backend.
  required_commands:
    - python -m pytest tests/test_reviewer_minimal_loop.py -q
    - python -m pytest tests/test_issue_ledger.py tests/test_reviewer_minimal_loop.py tests/test_go_dispatch.py -q
  observed_precheck:
    - tests/test_reviewer_minimal_loop.py: 30 passed
    - tests/test_issue_ledger.py + tests/test_reviewer_minimal_loop.py + tests/test_go_dispatch.py: 64 passed

hard_dependencies:
  - Phase 1 fake pipeline E2E must pass.
  - Issue Contract v0 must remain unchanged.
  - Ledger merge semantics must remain unchanged.
  - Finalizer blocking rules must remain unchanged.
  - Existing fail-closed behavior must remain unchanged.

must_do:
  - Add a model reviewer backend behind reviewer_node.
  - Keep deterministic reviewer as baseline guard.
  - Make model reviewer backend injectable and mockable.
  - Tests must not depend on real model calls.
  - Allow model reviewer to read only approved review inputs.
  - Parse model raw output through parse_model_review().
  - Convert parsed model findings into candidate issues.
  - Validate candidate issues with validate_issues().
  - Normalize validated candidate issues before writing review-issues.json.
  - Merge deterministic issues and model candidate issues.
  - Write authoritative review.md, review.yaml, and review-issues.json from deterministic code.
  - Preserve raw model output as model-review-raw.md for debugging.
  - Preserve parsed output as model-review-parse.json for debugging.
  - Generate P0 parse issue when model output is malformed.
  - Ensure malformed model output blocks finalizer.
  - Ensure model reviewer failure does not remove deterministic reviewer findings.
  - Enforce artifact ownership so executor/fixer cannot write review artifacts.
  - Enforce reviewer write restrictions so reviewer cannot modify source code or tests.

must_not_do:
  - Do not change Issue Contract v0.
  - Do not change allowed status values.
  - Do not change severity semantics.
  - Do not change recurrence_key merge behavior.
  - Do not change open/fixed/wontfix P0 blocking rules.
  - Do not change verified issue prompt exclusion.
  - Do not let the model directly write authoritative review.md.
  - Do not let the model directly write authoritative review.yaml.
  - Do not let the model directly write authoritative review-issues.json.
  - Do not let the model directly set finalizer pass/fail status.
  - Do not let reviewer modify code.
  - Do not implement plan_auditor.
  - Do not implement aihub issues CLI.
  - Do not implement complex governance strategy.
  - Do not add severity auto-escalation.
  - Do not add full real-agent chain assertions in this task.
  - Do not edit ai-workflow-hub/tasks.yaml.
  - Do not edit smoke_report.txt except via smoke_test.py.
  - Do not edit ai-workflow-hub-e2e files.

allow_write:
  - ai-workflow-hub/src/ai_workflow_hub/nodes/reviewer.py
  - ai-workflow-hub/src/ai_workflow_hub/issue_ledger.py
  - ai-workflow-hub/src/ai_workflow_hub/opencode_client.py
  - ai-workflow-hub/src/ai_workflow_hub/run_store.py
  - ai-workflow-hub/tests/test_reviewer_minimal_loop.py
  - ai-workflow-hub/tests/test_model_reviewer_backend.py
  - .ai/reports/2026-05-31-m4-a-model-reviewer-backend-result.md

deny_write:
  - .git/**
  - "**/.env"
  - "**/*secret*"
  - "**/*key*"
  - ai-workflow-hub/tasks.yaml
  - smoke_report.txt
  - ai-workflow-hub-e2e/**

reviewer_inputs:
  allowed:
    - TaskSpec
    - diff.patch
    - test-output.md
    - safety-report.json
    - state.json
    - ledger_prompt_context
    - previous open issues
    - executor summary
  forbidden:
    - arbitrary project files outside the approved review bundle
    - write access to source code
    - write access to test code
    - write access to pipeline config outside run_dir reviewer artifacts

reviewer_outputs:
  authoritative:
    - review.md
    - review.yaml
    - review-issues.json
  diagnostic:
    - model-review-raw.md
    - model-review-parse.json

authoritative_output_rule: >
  The model reviewer output is never authoritative by itself. The final
  review-issues.json must be generated by deterministic code after parsing,
  validation, normalization, and merging with deterministic reviewer findings.

model_review_pipeline:
  - collect approved reviewer inputs
  - call model reviewer backend
  - save raw model output
  - parse_model_review()
  - save model-review-parse.json
  - validate parsed candidate issues
  - normalize candidate issues
  - merge deterministic issues and model issues
  - write review.md
  - write review.yaml
  - write review-issues.json
  - run validate_issues() on final review-issues.json
  - pass final review-issues.json to Ledger merge

artifact_ownership:
  executor_fixer_forbidden_write:
    - review.md
    - review.yaml
    - review-issues.json
    - plan-review.md
    - plan-issues.json
  reviewer_forbidden_write:
    - source code
    - test code
    - project configuration files
    - files outside run_dir reviewer artifacts

fail_closed_rules:
  - If model output is malformed, create a P0 parse issue.
  - If parse_model_review() fails, create a P0 parse issue.
  - If validate_issues() fails, create a P0 parse issue.
  - If review.yaml is malformed, create a P0 parse issue.
  - Any P0 parse issue blocks finalizer.
  - Model failure must not silently remove deterministic reviewer findings.

tests:
  required:
    - mock model reviewer returns valid P1 issue -> issue enters review-issues.json
    - mock model reviewer returns valid P0 issue -> finalizer blocked
    - mock model reviewer returns malformed JSON -> P0 parse issue
    - mock model reviewer omits required fields -> P0 parse issue
    - mock model reviewer uses invalid severity -> P0 parse issue
    - deterministic reviewer issue and model issue are merged
    - executor attempts to write review.yaml -> blocked or detected
    - fixer attempts to write review-issues.json -> blocked or detected
    - reviewer attempts to modify source code -> blocked or impossible by construction
    - model reviewer failure does not bypass deterministic reviewer

acceptance_criteria:
  - Existing Phase 1 tests still pass.
  - Model reviewer backend is injectable and mockable.
  - Automated tests do not call the real model backend.
  - Model reviewer can produce candidate findings.
  - Candidate findings are not trusted until parsed, validated, and normalized.
  - Authoritative review-issues.json is generated by deterministic code.
  - model-review-raw.md and model-review-parse.json are written for diagnostics.
  - Bad model output fails closed.
  - Open/fixed/wontfix P0 still blocks finalizer.
  - Verified issues are still excluded from ledger_prompt_context.
  - executor/fixer cannot forge reviewer artifacts.
  - reviewer cannot modify code.
  - No Issue Contract v0 field or semantic change is introduced.

suggested_test_commands:
  - python -m pytest tests/test_reviewer_minimal_loop.py -q
  - python -m pytest tests/test_model_reviewer_backend.py tests/test_reviewer_minimal_loop.py -q
  - python -m pytest tests/test_issue_ledger.py tests/test_reviewer_minimal_loop.py tests/test_go_dispatch.py -q
  - python -m pytest tests/ -q
  - python smoke_test.py
