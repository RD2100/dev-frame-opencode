id: m4-l3-governance-matrix-format-validation
title: Validate governance matrix CLI format values explicitly
created_at: "2026-06-01T16:18:00+08:00"
mode: "@go"
profile: ai-dev
risk: low

goal: >
  Make the governance matrix CLI reject invalid `--format` values explicitly
  instead of silently falling back to panel output.

problem_statement:
  - "The governance matrix CLI currently accepts any string for `--format`."
  - "A typo like `--format markdonw` silently falls back to panel output."
  - "That behavior is misleading for reviewers and weakens trust in the human-facing coverage entrypoint."

must_do:
  - Restrict `governance matrix --format` to explicit supported values only.
  - Preserve existing supported formats: `panel` and `markdown`.
  - Make invalid format input fail clearly rather than silently rendering panel output.
  - Add focused tests for valid formats and invalid format rejection.
  - Include a real-path verification command for an invalid format value.

must_not_do:
  - Do not change runtime governance behavior.
  - Do not change blocking semantics.
  - Do not change the markdown/panel payloads themselves except as required for validation.
  - Do not touch coding_graph.py, shell_runner.py, tasks.yaml, ai-workflow-hub-e2e, or smoke_report.txt.

allow_write:
  - ai-workflow-hub/src/ai_workflow_hub/cli.py
  - ai-workflow-hub/tests/test_go_dispatch.py
  - .ai/tasks/2026-06-01-m4-l3-governance-matrix-format-validation.yaml
  - .ai/runs/m4-l3-governance-matrix-format-validation/**
  - .ai/reports/2026-06-01-m4-l3-governance-matrix-format-validation-result.md

deny_write:
  - .git/**
  - "**/.env"
  - "**/*secret*"
  - "**/*key*"
  - ai-workflow-hub/tasks.yaml
  - ai-workflow-hub-e2e/**
  - smoke_report.txt
  - ai-workflow-hub/src/ai_workflow_hub/shell_runner.py
  - ai-workflow-hub/src/ai_workflow_hub/workflows/coding_graph.py
  - ai-workflow-hub/src/ai_workflow_hub/governance_matrix.py

token_budget_guidance:
  - Read only the governance CLI branch and focused governance CLI tests unless blocked.
  - Keep the slice to input validation plus regression coverage only.

acceptance_criteria:
  - `--format panel` and `--format markdown` still work.
  - Invalid `--format` values fail clearly and do not render panel output.
  - Focused tests pass and the invalid-format real-path command demonstrates rejection.

suggested_test_commands:
  - python -m pytest tests/test_go_dispatch.py -q
  - python -m ai_workflow_hub.cli governance matrix --format markdown
  - python -m ai_workflow_hub.cli governance matrix --format markdonw
